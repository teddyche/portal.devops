<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppOps - Changement de mot de passe</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .box {
            background: white; border-radius: 12px; padding: 40px; width: 420px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; font-size: 24px; color: #333; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 28px; }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; color: #666; font-weight: bold; margin-bottom: 5px; }
        .form-group input {
            width: 100%; padding: 11px 14px; border: 1px solid #ddd; border-radius: 6px;
            font-size: 14px; outline: none; transition: border-color .15s;
        }
        .form-group input:focus { border-color: #007bff; }

        /* Indicateurs politique */
        .policy {
            margin-top: 12px; padding: 14px 16px; background: #f8f9fa;
            border-radius: 8px; font-size: 13px;
        }
        .policy-title { font-weight: bold; color: #555; margin-bottom: 8px; }
        .rule {
            display: flex; align-items: center; gap: 8px;
            color: #999; margin-bottom: 5px; transition: color .2s;
        }
        .rule.ok { color: #28a745; }
        .rule.ko { color: #dc3545; }
        .rule-icon { font-size: 14px; width: 18px; text-align: center; }

        .btn {
            width: 100%; padding: 13px; background: #007bff; color: white;
            border: none; border-radius: 8px; font-size: 15px; font-weight: bold;
            cursor: pointer; transition: background .15s; margin-top: 4px;
        }
        .btn:hover:not(:disabled) { background: #0056b3; }
        .btn:disabled { background: #a0c4f1; cursor: not-allowed; }

        .alert {
            border-radius: 8px; padding: 11px 14px; margin-bottom: 16px;
            font-size: 14px; display: none; align-items: center; gap: 8px;
        }
        .alert.show { display: flex; }
        .alert-error { background: #ffebee; border: 1px solid #ef9a9a; color: #c62828; }
        .alert-success { background: #e8f5e9; border: 1px solid #a5d6a7; color: #2e7d32; }
    </style>
</head>
<body>
<div class="box">
    <h1>🔐 Nouveau mot de passe</h1>
    <div class="subtitle">Votre mot de passe doit être changé pour continuer.</div>

    <div class="alert alert-error" id="alertError">
        <span>⚠️</span><span id="errorMsg"></span>
    </div>
    <div class="alert alert-success" id="alertSuccess">
        <span>✅</span><span>Mot de passe changé. Redirection en cours…</span>
    </div>

    <div class="form-group">
        <label>Nouveau mot de passe</label>
        <input type="password" id="newPw" placeholder="Nouveau mot de passe" oninput="checkPolicy()" autocomplete="new-password">
    </div>
    <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <input type="password" id="confirmPw" placeholder="Confirmer" oninput="checkPolicy()" autocomplete="new-password">
    </div>

    <div class="policy">
        <div class="policy-title">Politique de mot de passe :</div>
        <div class="rule" id="r-len"><span class="rule-icon">○</span> Minimum 8 caractères</div>
        <div class="rule" id="r-digit"><span class="rule-icon">○</span> Au moins 1 chiffre</div>
        <div class="rule" id="r-upper"><span class="rule-icon">○</span> Au moins 1 majuscule</div>
        <div class="rule" id="r-special"><span class="rule-icon">○</span> Au moins 1 caractère spécial</div>
        <div class="rule" id="r-match"><span class="rule-icon">○</span> Les mots de passe correspondent</div>
    </div>

    <button class="btn" id="btnSubmit" onclick="submit()" style="margin-top:20px;" disabled>
        Valider
    </button>
</div>

<script>
let _csrf = '';

(async function init() {
    try {
        const r = await fetch('/api/auth/me');
        if (r.ok) {
            const u = await r.json();
            _csrf = u.csrf_token || '';
        }
    } catch(e) {}
})();

function checkPolicy() {
    const pw = document.getElementById('newPw').value;
    const confirm = document.getElementById('confirmPw').value;

    const rules = {
        'r-len':     pw.length >= 8,
        'r-digit':   /\d/.test(pw),
        'r-upper':   /[A-Z]/.test(pw),
        'r-special': /[!@#$%^&*()\-_=+\[\]{}|;:,.<>?/~`]/.test(pw),
        'r-match':   pw.length > 0 && pw === confirm,
    };

    let allOk = true;
    for (const [id, ok] of Object.entries(rules)) {
        const el = document.getElementById(id);
        el.classList.toggle('ok', ok);
        el.classList.toggle('ko', !ok && (id !== 'r-match' ? pw.length > 0 : confirm.length > 0));
        el.querySelector('.rule-icon').textContent = ok ? '✓' : '○';
        if (!ok) allOk = false;
    }

    document.getElementById('btnSubmit').disabled = !allOk;
}

async function submit() {
    const pw = document.getElementById('newPw').value;
    const confirm = document.getElementById('confirmPw').value;

    hideAlerts();
    if (pw !== confirm) { showError('Les mots de passe ne correspondent pas'); return; }

    const btn = document.getElementById('btnSubmit');
    btn.disabled = true;
    btn.textContent = '…';

    try {
        const r = await fetch('/api/auth/password/change', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRF-Token': _csrf
            },
            body: JSON.stringify({ new_password: pw })
        });
        const data = await r.json();
        if (!r.ok) {
            showError(data.error || 'Erreur lors du changement');
            btn.disabled = false;
            btn.textContent = 'Valider';
            return;
        }
        document.getElementById('alertSuccess').classList.add('show');
        setTimeout(() => { window.location.href = '/'; }, 1500);
    } catch(e) {
        showError('Erreur réseau : ' + e.message);
        btn.disabled = false;
        btn.textContent = 'Valider';
    }
}

function showError(msg) {
    document.getElementById('errorMsg').textContent = msg;
    document.getElementById('alertError').classList.add('show');
}

function hideAlerts() {
    document.getElementById('alertError').classList.remove('show');
    document.getElementById('alertSuccess').classList.remove('show');
}

document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !document.getElementById('btnSubmit').disabled) submit();
});
</script>
</body>
</html>
